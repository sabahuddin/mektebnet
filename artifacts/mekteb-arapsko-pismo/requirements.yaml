  - path: "artifacts/mekteb-arapsko-pismo/public/images/amir-avatar.png"
    description: "A high-quality cute cartoon illustration of a young bosnian muslim boy named Amir wearing a green cap, smiling and friendly, 2D vector art style, clean transparent background"
    aspect_ratio: "1:1"
  - path: "artifacts/mekteb-arapsko-pismo/public/images/hero-bg.png"
    description: "Soft watercolor background in warm cream and light teal with subtle geometric islamic star patterns and floating glowing stars, suitable for a children's educational app"
