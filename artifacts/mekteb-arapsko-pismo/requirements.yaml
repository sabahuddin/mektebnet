images:
  - path: "artifacts/mekteb-arapsko-pismo/public/images/dzana-avatar.png"
    description: "A high-quality cute cartoon illustration of a young bosnian muslim girl named Dzana wearing a warm orange hijab, smiling and friendly, 2D vector art style, clean transparent background"
