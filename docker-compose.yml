services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mekteb
      POSTGRES_USER: mekteb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mekteb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://mekteb:${POSTGRES_PASSWORD:-changeme}@db:5432/mekteb
      JWT_SECRET: ${JWT_SECRET:-mekteb-secret-change-in-production}
      NODE_ENV: production
      PORT: 3000
      SERVE_STATIC: "true"
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mekteb.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.mekteb.entrypoints=websecure"
      - "traefik.http.routers.mekteb.tls.certresolver=letsencrypt"
      - "traefik.http.services.mekteb.loadbalancer.server.port=3000"

volumes:
  pgdata:
